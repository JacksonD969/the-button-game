<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Button - Interactive Story Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Open Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0a0a0f;
      overflow-x: hidden;
    }
    .menu-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
      width: 90%;
      max-width: 400px;
    }
    .menu-btn {
      background: rgba(30,30,50,0.8);
      border: 2px solid #00f0ff;
      color: #00f0ff;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 16px;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      text-align: center;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .menu-btn:hover {
      background: #00f0ff;
      color: #000;
      box-shadow: 0 0 30px #00f0ff;
      transform: scale(1.05);
    }
    .menu-btn.create { border-color: #ff00ff; color: #ff00ff; }
    .menu-btn.create:hover { background: #ff00ff; color: #000; box-shadow: 0 0 30px #ff00ff; }
    .menu-btn.import { border-color: #ffaa00; color: #ffaa00; }
    .menu-btn.import:hover { background: #ffaa00; color: #000; box-shadow: 0 0 30px #ffaa00; }
    .menu-btn.community { border-color: #00ff41; color: #00ff41; }
    .menu-btn.community:hover { background: #00ff41; color: #000; box-shadow: 0 0 30px #00ff41; }

    h1 {
      font-family: 'Orbitron', sans-serif;
      color: white;
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 10px;
      text-shadow: 0 0 20px #00f0ff;
      letter-spacing: 4px;
    }
  </style>
</head>
<body>
  <div class="menu-container">
    <h1>THE BUTTON</h1>
    <button class="menu-btn create" onclick="location.href='editor.html'">✍️ Create Scenario</button>
    <button class="menu-btn" onclick="location.href='player.html?mode=local'">🎮 Play Saved Scenarios</button>
    <button class="menu-btn import" onclick="document.getElementById('fileInput').click()">📂 Import Story from Device</button>
    <button class="menu-btn community" onclick="location.href='community.html'">🌐 Community</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="importStory(event)">
  </div>
  <script>
    function importStory(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          localStorage.setItem('imported_scenario', JSON.stringify(data));
          window.location.href = 'player.html?mode=imported';
        } catch (err) {
          alert('Invalid JSON file. Please check the file and try again.');
        }
      };
      reader.readAsText(file);
    }
  </script>
</body>
</html>
